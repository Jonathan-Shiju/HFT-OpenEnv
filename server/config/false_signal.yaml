        market_order_prob: 0.2
        base_size: 20
        sigma: 0.03
      - arrival_rate: 0.35
        market_order_prob: 0.2
        base_size: 20
        sigma: 0.03
      - arrival_rate: 0.35
        market_order_prob: 0.2
        base_size: 20
        sigma: 0.03
      - arrival_rate: 0.35
        market_order_prob: 0.2
        base_size: 20
        sigma: 0.03
      - arrival_rate: 0.35
        market_order_prob: 0.2
        base_size: 20
        sigma: 0.03
      - arrival_rate: 0.35
        market_order_prob: 0.2
        base_size: 20
        sigma: 0.03
      - arrival_rate: 0.35
